---
launch:

  - arg:
      name: config_dir
      default: ''
      description: Path to the common configuration directory. You can create such common configuration
        directory with `ros2 run rosbot_utils create_config_dir {directory}`.

  - arg:
      name: configuration
      default: basic
      description: Specify configuration packages. Currently only ROSbot XL has available packages
      choice:
        - value: basic
        - value: custom

  - arg:
      name: controller_config
      default: ''
      description: Run joint_state_publisher for simulating joint states of the robot (visualization only).

  - arg:
      name: mock_joints
      default: 'True'
      description: Run joint_state_publisher for simulating joint states of the robot (visualization only).
      choice:
        - value: 'True'
        - value: 'False'
  - arg:
      name: namespace
      default: $(env ROBOT_NAMESPACE '')
      description: Add namespace to all launched nodes.

  - arg:
      name: mecanum
      default: 'False'
      description: Whether to use mecanum drive controller, otherwise use diff drive
      choice:
        - value: 'True'
        - value: 'False'

  - arg:
      name: use_sim
      default: 'False'
      description: Whether to use simulation time.
      choice:
        - value: 'True'
        - value: 'False'

  - set_parameter:
      name: use_sim_time
      value: $(var use_sim)

  - set_remap:
      from: /tf
      to: tf
  - set_remap:
      from: /tf_static
      to: tf_static

  - let:
      name: xacro_file
      value: $(find-pkg-share rosbot_description)/urdf/rosbot.urdf.xacro
  - let:
      name: components_config
      value: $(eval "('$(var config_dir)/rosbot_description' if '$(var config_dir)' else '$(find-pkg-share
        rosbot_description)') + '/config/rosbot/$(var configuration).yaml'")
  - let:
      name: urdf_file
      value: /tmp/rosbot_description_$(var namespace).urdf

  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      param:
        - name: robot_description
          value: |
            $(command "bash -c '
              xacro $(var xacro_file) \
                components_config:=$(var components_config) \
                configuration:=$(var configuration) \
                controller_config:=$(var controller_config) \
                mecanum:=$(var mecanum) \
                namespace:=$(var namespace) \
                use_sim:=$(var use_sim) \
              | tee $(var urdf_file)
            '")

  - node:
      pkg: joint_state_publisher
      exec: joint_state_publisher
      if: $(var mock_joints)
