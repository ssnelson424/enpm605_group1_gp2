---
launch:

  - arg:
      name: config_dir
      default: ''
      description: Path to the common configuration directory. You can create such common configuration
        directory with `ros2 run rosbot_utils create_config_dir {directory}`.

  - let:
      name: ekf_config
      value: $(eval "('$(var config_dir)/rosbot_localization' if '$(var config_dir)' else '$(find-pkg-share
        rosbot_localization)') + '/config/config.yaml'")

  - node:
      pkg: robot_localization
      exec: ekf_node
      name: ekf
      param:
        - from: $(var ekf_config)
      remap:
        - from: /diagnostics
          to: diagnostics
