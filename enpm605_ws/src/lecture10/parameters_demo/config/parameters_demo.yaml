camera_demo:
  ros__parameters:
    camera_name: 'front_cam'
    camera_frame_id: 'cam_link'
    fps: 30
    exposure_auto: true
    exposure_time_us: 10000
    brightness: 128
    image_width: 1920
    image_height: 1080
    encoding: 'bgr8'
    camera_info_url: ''

lidar_demo:
  ros__parameters:
    lidar_name: 'top_lidar'
    lidar_frame_id: 'lidar_link'
    min_range: 0.1
    max_range: 100.0
    min_angle: -3.14159
    max_angle: 3.14159
    intensity_threshold: 0.0
    scan_frequency: 10
    port: '/dev/lidar0'
    return_mode: 'strongest'
