# Three goals for the GP2 action client.
#
# Each goal is a named block with x, y, and final_heading fields.
#
# Coordinates are in the odom frame (meters).
# final_heading is the desired yaw at the goal (radians).
#
# Layout: equilateral triangle of radius 5 m around the origin.
# Vertices at angles 0, 2*pi/3, -2*pi/3. Each final_heading points
# radially outward (away from the origin).

# Load this file in your launch file using the parameters field of the client Node action. 
# In your client node, access each field with dot-namespaced parameter names, for example 
# self.get_parameter("goal1.x"), self.get_parameter("goal1.y"), and self.get_parameter("goal1.final_heading") 
# (and likewise for goal2 and goal3).

/**:
  ros__parameters:
    goal1:
      x: 5.0
      y: 0.0
      final_heading: 0.0
    goal2:
      x: -2.5
      y: 4.330127
      final_heading: 2.0943951
    goal3:
      x: -2.5
      y: -4.330127
      final_heading: -2.0943951